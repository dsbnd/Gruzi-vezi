spring.application.name=rzd-dispatcher


spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

spring.jpa.properties.hibernate.transaction.jta.platform=org.hibernate.engine.transaction.jta.platform.internal.JBossAppServerJtaPlatform
spring.transaction.jta.enabled=true
spring.jpa.properties.jta.enabled=true

spring.datasource.jndi-name=java:/jdbc/gruzivezi
spring.datasource.type=org.springframework.jdbc.datasource.lookup.JndiDataSourceLookup

spring.redis.host=localhost
spring.redis.port=6379

jwt.expiration=86400000
jwt.refresh-expiration=604800000

server.port=8080
server.servlet.context-path=/